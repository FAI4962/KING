name: Build AES

ON:
 Workflow_dispatch:

 jobs:
  build:
   runs-on: windows-latest

   steps:

   - name: Download source
     uses: actions/checkout@v4

   - name: Compile
     run: g++ Main.cpp -o Main.exe
     
   - name: Upload EXE
     uses: action/upload-artifact@v4
     with:
      name: Main-EXE
      path: Main.exe
